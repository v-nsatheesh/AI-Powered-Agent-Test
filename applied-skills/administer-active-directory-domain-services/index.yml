summary: |-
  This learning path provides guidance on managing Active Directory Domain Services (AD DS). It covers essential tasks such as managing users and groups, configuring and managing Group Policy, and maintaining AD DS infrastructure. This learning path helps learners develop skills to implement and manage AD DS in a Windows Server environment, to ensure secure and efficient management of directory services.
tasks:
  - Deploy and manage AD DS domain controllers,
  - Configure Active Directory topology,
  - Create and manage AD DS objects,
  - Create and configure Group Policy Objects (GPOs) in AD DS,
  - Manage security in AD DS
