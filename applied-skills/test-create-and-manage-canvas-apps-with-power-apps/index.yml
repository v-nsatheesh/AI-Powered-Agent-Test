summary: |-
  This learning path guides you through creating and managing canvas apps using Microsoft Power Apps. It covers the fundamentals of building canvas apps, including designing user interfaces, connecting to data sources, and implementing app logic. The path also includes managing app versions and sharing apps with others. It is designed to help users develop skills to create custom business applications without extensive coding.
