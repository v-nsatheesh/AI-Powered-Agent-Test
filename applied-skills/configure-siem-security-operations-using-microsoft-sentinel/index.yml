summary: |-
> [!WARNING]
> Test Warning

This learning path titled "Manage Azure resources: Fundamentals" on Microsoft Learn provides an introduction to managing Azure resources. It covers creating and configuring Azure resources, managing resource groups, and monitoring their performance. The path is designed to help learners gain practical skills using both the Azure portal and Azure CLI to perform essential management tasks. This learning path is ideal for individuals new to Azure who want to develop skills to navigate and manage Azure environments effectively.

> [!NOTE]
> Test Note

