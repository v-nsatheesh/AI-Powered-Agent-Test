> Test Important

tasks:
  - Create a free account on Microsoft Azure and explore the dashboard
  - Set up a new Resource Group for organizing resources
  - Deploy a Virtual Machine (VM) using the Azure Portal
  - Configure VM size, region, and basic networking settings
  - Connect to the VM using RDP/SSH
  - Tag resources for better categorization and cost tracking
  - Move resources between different resource groups
  - Apply basic role-based access control (RBAC) to a resource group
  - Set up a storage account and configure access tiers
  - Install and configure the Azure CLI locally
  - Create a resource group using CLI commands
  - Deploy a VM using CLI instead of the portal
  - List and filter resources using CLI queries
  - Enable monitoring for a VM using Azure Monitor
  - View metrics like CPU usage and network activity
  - Set up alerts for high resource usage
  - Check activity logs for resource changes
  - Apply a simple Azure Policy to restrict resource locations
  - Review cost analysis for created resources
  - Delete unused resources to avoid charges
  - Clean up the resource group after completing exercises
