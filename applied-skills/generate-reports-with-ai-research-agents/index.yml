summary: |-
  To earn this Microsoft Applied Skills credential, learners demonstrate the ability to generate business reports by using AI research agents.

  Learners for this credential should be familiar with generative AI (a type of artificial intelligence that creates content).

  Experience with using prompts in Microsoft Copilot is recommended.
  > [!IMPORTANT]
    > passing score
tasks:
  - Define scope, identify sources, and create an initial draft for a report by using the Researcher agent
  - Refine a report by using Researcher
  - Finalize a report by using Researcher
