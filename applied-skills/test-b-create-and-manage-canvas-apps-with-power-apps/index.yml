summary: |-
  To earn this Microsoft Applied Skills credential, learners demonstrate the ability to solve business problems by creating canvas apps with Microsoft Power Platform.
  Candidates for this credential should understand application development, writing formulas such as those in Excel, and creating, reading, updating, and deleting data.
> [!IMPORTANT]
  > This will be released on March 20th.
