summary: |-
  To earn this Microsoft Applied Skills credential, learners demonstrate the ability to protect information in Microsoft 365 Copilot by using Microsoft Purview.

  Candidates for this credential should have a strong understanding of using Microsoft Purview Information Protection, Microsoft Purview Data Loss Prevention, Microsoft Purview Audit, and Microsoft Purview Data Security Posture Management (DSPM). They should also have familiarity with the Microsoft Purview portal and with data loss prevention (DLP) policies in Microsoft 365. Candidates should understand data classification concepts, including sensitive information types and sensitivity labels.

tasks:
  - Manage and review Microsoft 365 Copilot audit logs
  - Restrict Copilot access to information by using sensitivity labels and sensitive info types
  - Create and configure a DLP policy to restrict Copilot usage
