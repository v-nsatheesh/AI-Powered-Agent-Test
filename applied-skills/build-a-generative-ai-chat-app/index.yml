summary: |-
  To earn this Microsoft Applied Skills credential, learners demonstrate the ability to build a generative AI chat application. 

  Candidates for this credential should have a solid understanding of working with Microsoft's Foundry and language models. They must also have experience programming in Python or C#. This assessment lab requires experience in software development or programming. If you don’t have coding experience, consider exploring Microsoft Applied Skills: Create an AI Agent as an alternative.
tasks:
  - Prepare and deploy a model in Microsoft Foundry
  - Create a chat app by using the Microsoft Foundry SDK
  - Implement chat history
